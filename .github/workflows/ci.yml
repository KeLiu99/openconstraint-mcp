name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Supersede in-flight runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just sync
      - run: just lint
      - run: just typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just sync
      # Default suite excludes integration tests that may need a managed runtime.
      - run: just test
      # These integration tests use only sys.executable and POSIX process groups.
      - name: POSIX process-tree integration tests
        run: just pytest -m integration tests/shared/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  macos-acceptance:
    # Apple Silicon (arm64) managed-runtime acceptance. Heavy — it downloads the
    # real ~170MB MiniZinc .dmg and is the release gate from
    # docs/plans/2026-06-10-install-runtime-macos-arm64.md, so it runs only on
    # manual dispatch, never on every push/PR.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    env:
      OPENCONSTRAINT_MCP_RUN_INSTALL_DOWNLOAD_TEST: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just sync
      # Hard gate: installs the managed runtime from the real .dmg and asserts a
      # solve through cp-sat and chuffed (test_integration_macos.py). Gecode is
      # deliberately not asserted here — its ship/drop verdict is recorded below.
      - name: Integration test (cp-sat, chuffed, gecode must solve)
        run: just integration
      # The integration test installs into an ephemeral pytest tmp dir and tears
      # it down, so install once more into a persistent location to capture the
      # otool/solve diagnostics. `!cancelled()` runs these even when the
      # integration step above fails — exactly when the diagnostics matter.
      - name: Install managed runtime for Gecode diagnostics
        if: ${{ !cancelled() }}
        run: just cli install-runtime --runtime-dir "$RUNNER_TEMP/oc-runtime" --yes
      - name: Record Gecode linkage + solve verdict (log + summary; never fails the job)
        if: ${{ !cancelled() }}
        run: |
          set +e
          RT="$RUNNER_TEMP/oc-runtime"
          MZN="$RT/bin/minizinc"
          FZN_GECODE="$RT/bin/fzn-gecode"

          printf 'var 1..3: x;\nconstraint x > 1;\nsolve satisfy;\n' > "$RUNNER_TEMP/gecode-probe.mzn"
          GECODE_OUT="$("$MZN" --solver org.gecode.gecode "$RUNNER_TEMP/gecode-probe.mzn" 2>&1)"
          GECODE_RC=$?

          # tee so the diagnostics land in the console log (gh run view --log) AND the
          # run Summary; the Summary page alone is not reachable from the CLI/API.
          {
            echo "## macOS managed-runtime acceptance"
            echo ""
            echo "### minizinc binary architecture"
            echo '```'
            file "$MZN"
            lipo -archs "$MZN"
            echo '```'
            echo "### solver configs shipped (share/minizinc/solvers)"
            echo '```'
            ls -1 "$RT/share/minizinc/solvers" 2>&1 || echo "solvers dir missing"
            echo '```'
            echo "### fzn-gecode dylib references (otool -L)"
            echo '```'
            otool -L "$FZN_GECODE" 2>&1 || echo "otool failed or fzn-gecode missing"
            echo '```'
            echo "### fzn-gecode rpaths (otool -l, LC_RPATH)"
            echo '```'
            otool -l "$FZN_GECODE" 2>&1 | grep -A2 LC_RPATH || echo "no LC_RPATH found"
            echo '```'
            echo "### Gecode headless solve verdict"
            if [ "$GECODE_RC" -eq 0 ]; then
              echo "**Gecode loads and solves (rc=0).**"
            else
              echo "**Gecode failed (rc=$GECODE_RC)** — its Qt frameworks live outside the reshaped runtime; the references and rpaths above scope what would need vendoring to keep it headless."
            fi
            echo '```'
            echo "$GECODE_OUT"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

          echo "Gecode solve exit code: $GECODE_RC"
          # Verdict is recorded, not gated — never fail the job on the Gecode outcome.
          exit 0

  windows-acceptance:
    # Windows x86_64 managed-runtime acceptance. The silent NSIS install can't be
    # verified on a headless runner: setup.exe re-launches itself elevated for UAC
    # and the consent prompt has no answerer, so it hangs (it once burned a runner
    # for hours, leaving orphan `…setup-win64.tmp` processes). gsudo hits the same
    # wall — it needs the same consent. So this job verifies what IS headless: the
    # pinned bundle downloads and its sha256 matches on Windows
    # (test_windows_bundle_downloads_and_verifies). The full silent install+solve
    # (test_install_runtime_end_to_end_on_windows) is gated behind
    # OPENCONSTRAINT_MCP_RUN_WINDOWS_INSTALL_TEST and skipped here — a maintainer
    # runs it on a real interactive Windows host, clicking the UAC prompt. Heavy
    # (downloads the ~35MB installer), so it runs only on manual dispatch.
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    # Download is quick; bound the job anyway so a future hang fails fast.
    timeout-minutes: 15
    env:
      OPENCONSTRAINT_MCP_RUN_INSTALL_DOWNLOAD_TEST: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just sync
      # Downloads the real pinned NSIS bundle and checks its sha256 on Windows.
      # The end-to-end install test skips: its UAC elevation can't be answered
      # headless (see the job comment above).
      - name: Verify Windows bundle download + integrity (silent install skipped — headless UAC)
        run: just integration

name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Supersede in-flight runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just sync
      - run: just lint
      - run: just typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just sync
      # Unit tests only; integration tests need a real runtime and are excluded.
      - run: just test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error